name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Download Windows FFmpeg
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath . -Force
          $ffmpegDir = Get-ChildItem -Filter "ffmpeg-*-essentials_build" | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path src-tauri/resources
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" src-tauri/resources/
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" src-tauri/resources/
          Remove-Item ffmpeg.zip -Recurse -Force
          Remove-Item $ffmpegDir.FullName -Recurse -Force

      - name: Build Tauri app
        run: npm run tauri build
        env:
          CI: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Create Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
